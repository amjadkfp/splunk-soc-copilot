# SOC Copilot — Splunk Saved Searches & Alerts
# ===============================================
# File:    splunk/saved_search.conf
#
# Install options
# ───────────────
# Option A (App):
#   Copy to $SPLUNK_HOME/etc/apps/<your_app>/local/savedsearches.conf
#   then restart Splunk or bump the app version.
#
# Option B (Splunk Web):
#   Settings → Searches, Reports, and Alerts → New Alert
#   Use the SPL and settings below as a reference when filling in the form.
#
# Option C (REST API):
#   POST /servicesNS/nobody/<app>/saved/searches  with the key=value pairs.
#
# Notes
# ─────
# * All searches target index=soc_copilot sourcetype=soc_copilot — the
#   index and sourcetype that SplunkHECClient writes to.
# * Adjust cron_schedule and dispatch.earliest_time to match your event
#   ingestion rate.  The default runs every 5 minutes and looks back 10 min.
# * Fill in action.email.to with a real distribution list before enabling
#   the email action.
# ===============================================


# ── Alert 1: Brute Force / Password Spray ────────────────────────────────────
[SOC Copilot - Brute Force Alert - 5+ Failed Logons in 10 Minutes]

description = Fires when 5 or more Event ID 4625 (Failed Account Logon) events \
    appear for the same TargetUserName within a rolling 10-minute window.  \
    This pattern is a strong indicator of a brute force or password spray \
    attack against Windows accounts.  Tune the threshold (where count >= 5) \
    to match your environment's baseline.

# ── SPL ───────────────────────────────────────────────────────────────────────
# Aggregate 4625 failures by target account over the evaluation window,
# then filter accounts that have crossed the threshold.
search = index=soc_copilot sourcetype=soc_copilot EventID=4625 \
    | stats count AS failure_count by TargetUserName \
    | where failure_count >= 5 \
    | eval alert_detail = "Brute force detected: " . failure_count \
                        . " failures for account: " . TargetUserName \
    | table TargetUserName, failure_count, alert_detail

# ── Time range for each scheduled evaluation ──────────────────────────────────
# Look back 10 minutes on each run so detections are never missed between runs.
dispatch.earliest_time = -10m@m
dispatch.latest_time   = now

# ── Schedule: run every 5 minutes ─────────────────────────────────────────────
enableSched   = 1
cron_schedule = */5 * * * *

# ── Alert trigger ─────────────────────────────────────────────────────────────
# Fire when the search returns at least 1 row (= at least one account hit the
# failure threshold).
counttype = number of events
relation  = greater than
quantity  = 0

# ── Alert properties ──────────────────────────────────────────────────────────
# severity: 1=DEBUG 2=INFO 3=WARN 4=ERROR(High) 5=SEVERE 6=FATAL
alert.severity = 4
alert.suppress = 0
alert.track    = 1

# Alert once per unique TargetUserName within a 30-minute suppression window
# to avoid flooding the SOC with repeated notifications for the same account.
alert.suppress.fields  = TargetUserName
alert.suppress.period  = 30m

# ── Notification action ───────────────────────────────────────────────────────
alert.actions = email

# Replace the address below with your SOC distribution list.
action.email.to      = soc-team@example.com
action.email.subject = [SOC Copilot ALERT] Brute Force Detected — $result.TargetUserName$

action.email.message.alert = \
    SOC Copilot has detected a brute force / password spray attack.\n\n\
    Account targeted : $result.TargetUserName$\n\
    Failed attempts  : $result.failure_count$ (in the last 10 minutes)\n\n\
    Recommended actions:\n\
      1. Review authentication logs for source IPs and timestamps.\n\
      2. Consider temporarily locking the account if failures are ongoing.\n\
      3. Block the source IP at the perimeter firewall if external.\n\
      4. Enable or verify MFA on the targeted account.\n\n\
    Full details: $results_link$

action.email.sendresults = 1
action.email.inline      = 1
action.email.format      = plain


# ── Alert 2: Privilege Escalation — User Added to Privileged Group ────────────
[SOC Copilot - Privilege Escalation - User Added to Privileged Group]

description = Fires when Event ID 4728 (Member Added to Security-Enabled \
    Global Group) is detected, indicating that a user account has been added \
    to a privileged group such as Domain Admins.  Any such change that is not \
    backed by an approved change request should be investigated immediately.

search = index=soc_copilot sourcetype=soc_copilot EventID=4728 \
    | eval actor  = coalesce(SubjectUserName, "Unknown") \
    | eval target = coalesce(TargetUserName,  "Unknown") \
    | table TimeCreated, actor, target, ComputerName, mitre_technique_id

dispatch.earliest_time = -5m@m
dispatch.latest_time   = now

enableSched   = 1
cron_schedule = */5 * * * *

counttype = number of events
relation  = greater than
quantity  = 0

alert.severity = 5
alert.suppress = 0
alert.track    = 1

alert.suppress.fields = TargetUserName
alert.suppress.period = 60m

alert.actions = email

action.email.to      = soc-team@example.com
action.email.subject = [SOC Copilot CRITICAL] Privilege Escalation — $result.target$ added to privileged group

action.email.message.alert = \
    SOC Copilot has detected a privilege escalation event.\n\n\
    Actor (who made the change) : $result.actor$\n\
    Target (account elevated)   : $result.target$\n\
    Host                        : $result.ComputerName$\n\
    MITRE Technique             : $result.mitre_technique_id$\n\n\
    Recommended actions:\n\
      1. Verify this change was approved via your change management process.\n\
      2. If unauthorized, remove the account from the group immediately.\n\
      3. Investigate the actor account for signs of compromise.\n\
      4. Review all actions taken by the elevated account since the change.\n\n\
    Full details: $results_link$

action.email.sendresults = 1
action.email.inline      = 1
action.email.format      = plain


# ── Alert 3: High-volume Threat Hunt Findings ─────────────────────────────────
[SOC Copilot - Threat Hunt - High Severity Findings]

description = Fires when the SOC Copilot threat-hunt engine generates a High \
    or Critical finding (sourcetype=soc_copilot_threat).  These findings are \
    created by the /api/threat-hunt endpoint based on cross-event pattern \
    analysis (brute force, privilege escalation, suspicious processes).

search = index=soc_copilot sourcetype=soc_copilot_threat \
    severity IN ("Critical", "High") \
    | table _time, finding_type, severity, description, recommendation

dispatch.earliest_time = -15m@m
dispatch.latest_time   = now

enableSched   = 1
cron_schedule = */10 * * * *

counttype = number of events
relation  = greater than
quantity  = 0

alert.severity = 4
alert.suppress = 0
alert.track    = 1

alert.suppress.fields = finding_type
alert.suppress.period = 30m

alert.actions = email

action.email.to      = soc-team@example.com
action.email.subject = [SOC Copilot THREAT HUNT] $result.finding_type$ — $result.severity$ Severity

action.email.message.alert = \
    SOC Copilot Threat Hunt has identified a $result.severity$ severity finding.\n\n\
    Finding type   : $result.finding_type$\n\
    Description    : $result.description$\n\
    Recommendation : $result.recommendation$\n\n\
    Full details: $results_link$

action.email.sendresults = 1
action.email.inline      = 1
action.email.format      = plain
